services:
  - type: web
    name: promptgenie-backend
    runtime: python3
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: BASE_URL
        sync: false
    healthCheckPath: /
  - type: web
    name: promptgenie-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: API_BASE_URL
        sync: false
    routes:
      - type: redirect
        source: /api/(.*)
        destination: promptgenie-backend/api/$1